name: Daily GitHub Trending to Feishu

on:
  schedule:
    # 每天早上 8:00 触发 (UTC 时间 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击运行测试

jobs:
  push_trending:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Python Script
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        # 修正此处：将手机号环境变量替换为邮箱环境变量
        FEISHU_RECEIVER_EMAIL: ${{ secrets.FEISHU_RECEIVER_EMAIL }}
      run: python trending.py
