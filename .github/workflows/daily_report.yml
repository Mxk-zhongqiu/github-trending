name: Daily GitHub Trending to Feishu

on:
  schedule:
    # 每天早上 8:00 触发 (UTC 时间 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行测试

jobs:
  push_trending:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Python Script
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      run: python trending.py
